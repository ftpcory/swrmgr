# swrmgr stack template
# All ${VARIABLE} references are resolved by envsubst at deploy time.
# Customize this file for your application's services.

services:
  # Example database service
  db:
    env_file: .env
    image: ${SWRMGR_ECR_REGISTRY}/your-org/db:stable
    ports:
      - target: 3306
        published: ${DATABASE_EXPOSE_PORT}
        protocol: tcp
        mode: host
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - internal
    deploy:
      update_config:
        parallelism: 1
        order: stop-first
        failure_action: rollback
      labels:
        - "traefik.enable=false"
      placement:
        constraints: [${DB_PLACEMENT_CONSTRAINT}]

  # Example application service
  app:
    env_file: .env
    image: ${SWRMGR_ECR_REGISTRY}/your-org/app:${IMG_TAG}
    networks:
      - traefik-public-${stack_safe}
      - internal
    deploy:
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
      placement:
        constraints: [${APP_PLACEMENT_CONSTRAINT}]
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik-public-${stack_safe}"
        - "traefik.http.routers.${stack_safe}_app.rule=Host(`${STACK_DOMAIN}`)"
        - "traefik.http.routers.${stack_safe}_app.entrypoints=web"
        - "traefik.http.services.${stack_safe}_app.loadbalancer.server.port=80"

volumes:
  dbdata:

networks:
  internal:
    driver: overlay
  traefik-public-${stack_safe}:
    external: true
